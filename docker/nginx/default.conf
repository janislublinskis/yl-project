server {
    listen 80;
    server_name _;

    # Laravel public directory is the web root
    root /var/www/html/public;
    index index.php index.html;

    # Access and error logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Try the file directly, then as a directory,
    # finally fall back to index.php (Laravel's front controller)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Forward .php requests to PHP-FPM on the default port
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # Deny access to dot-files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }

    # Cache static assets aggressively
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2)$ {
        try_files $uri /index.php?$query_string;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
